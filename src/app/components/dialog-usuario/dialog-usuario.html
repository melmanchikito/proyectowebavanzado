<div class="dialog-backdrop">
    <div class="dialog-box">
        <div class="dialog-header">
            <h2>{{ modo === 'crear' ? '➕ Nuevo Usuario' : '👤 Editar Usuario' }}</h2>
            <button class="close-btn" (click)="cerrarDialog()">✖</button>
        </div>

        @if (usuario) {
        <div class="dialog-body">
            <div class="form-group">
                <label for="nombre">Nombre</label>
                <input id="nombre" [(ngModel)]="usuario.nombre" type="text">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" [(ngModel)]="usuario.email" type="email">
            </div>

            @if (tienePassword()) {
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input id="password" [(ngModel)]="usuario.password" type="password" autocomplete="new-password">
            </div>
            }

            <div class="form-group">
                <label for="rolId">Rol</label>
                <select id="rolId" [(ngModel)]="usuario.rolId">
                    <option [ngValue]="null" disabled>Seleccione un rol</option>
                    @for (rol of roles; track rol.rolId) {
                    <option [ngValue]="rol.rolId">{{ rol.nombre }}</option>
                    }
                </select>
            </div>
        </div>

        <div class="dialog-footer">
            <button class="btn-cancel" (click)="cerrarDialog()">Cancelar</button>
            <button class="btn-save" (click)="guardarCambios()">Guardar</button>
        </div>
        }
    </div>
</div>
