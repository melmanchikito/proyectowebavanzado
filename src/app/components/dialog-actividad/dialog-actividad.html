<div class="dialog-backdrop">

  <div class="dialog-box">

    <div class="dialog-header">
      <h2>✏️ Editar Actividad</h2>
      <button class="close-btn" (click)="cerrarDialog()">✖</button>
    </div>

    <div class="dialog-body">

      <div class="form-group">
        <label for="nombre">Nombre</label>
        <input id="nombre" [(ngModel)]="actividad.nombre" type="text">
      </div>

      <div class="form-group">
        <label for="tipo">Tipo</label>
        <select id="tipo" [(ngModel)]="actividad.tipo">
          <option>Letras</option>
          <option>Numeros</option>
          <option>Colores</option>
          <option>Juego educativo</option>
          <option>Lectura</option>
        </select>
      </div>

      <div class="form-group">
        <label for="responsable">Responsable</label>
        <select id="responsable" [(ngModel)]="actividad.responsableUsuarioId">
          <option [ngValue]="null">Sin responsable</option>
          @for (responsable of responsables; track responsable.usuarioId) {
            <option [ngValue]="responsable.usuarioId">{{ responsable.nombre }}</option>
          }
        </select>
      </div>

      <div class="form-group">
        <label for="estado">Estado</label>
        <select id="estado" [(ngModel)]="actividad.estado">
          <option value="A">Activo</option>
          <option value="N">Pendiente</option>
          <option value="I">Inactivo</option>
        </select>
      </div>

      <div class="form-group">
        <label for="nivel">Nivel</label>
        <select id="nivel" [(ngModel)]="actividad.nivel">
          <option>Inicial</option>
          <option>Basico</option>
          <option>Intermedio</option>
          <option>Avanzado</option>
        </select>
      </div>

      <div class="form-group">
        <label for="fecha">Fecha</label>
        <input id="fecha" [(ngModel)]="actividad.fecha" type="date">
      </div>

    </div>

    <div class="dialog-footer">
      <button class="btn-cancel" (click)="cerrarDialog()">Cancelar</button>
      <button class="btn-save" (click)="guardarCambios()">Guardar</button>
    </div>

  </div>

</div>
